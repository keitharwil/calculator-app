<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Calculate</title>
</head>
<body>
    <div class="calculator-body">
        <div class="calculator-digits">
            <button>0</button>
            <button>.</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
        </div>
        <div class="calculator-operations">    
            <button>+</button>
            <button>-</button>
            <button>/</button>
            <button>x</button>
            <button>=</button>
        </div>
    </div>
</body>
</html>
