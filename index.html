<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <title>Calculate</title>
</head>
<body>
    <div class="calculator-body">
        <p class="calculator-display">
            lorem ipsum
        </p>
        <div class="calculator-functions extra">
            <button id="clear-button">AC</button>
            <button class="operation-buttons" id="=">=</button>
        </div>
        <div class="calculator-functions">
            <div class="calculator-digits">
                <div class="calculator-digits-row">
                    <button class="calculator-number" id="9">9</button>
                    <button class="calculator-number" id="8">8</button>
                    <button class="calculator-number" id="7">7</button>
                </div>
                <div class="calculator-digits-row">
                    <button class="calculator-number" id="6">6</button>
                    <button class="calculator-number" id="5">5</button>
                    <button class="calculator-number" id="4">4</button>
                </div>
                <div class="calculator-digits-row">
                    <button class="calculator-number" id="3">3</button>
                    <button class="calculator-number" id="2">2</button>
                    <button class="calculator-number" id="1">1</button>
                </div>
                <div class="calculator-digits-row">
                    <button class="calculator-number" id="0">0</button>
                    <button class="calculator-number" id="decimal-point">.</button>
                    <button class="calculator-number" id="sign"> +/- </button>
                    
                </div>
            </div>
            <div class="calculator-operations">    
                <button class="operation-buttons" id="+">+</button>
                <button class="operation-buttons" id="-">-</button>
                <button class="operation-buttons" id="*">x</button>
                <button class="operation-buttons" id="/">÷</button>
            </div>
        </div>
    </div>
</body>
</html>
